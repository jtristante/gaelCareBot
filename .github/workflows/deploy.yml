name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files to deploy dir
        run: cp docker-compose.yml docker-compose.prod.yml Dockerfile.sqlite-web .env.example /opt/gaelcarebot/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        working-directory: /opt/gaelcarebot
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml pull gaelcarebot

      - name: Build sqlite-web
        working-directory: /opt/gaelcarebot
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build sqlite-web

      - name: Restart services
        working-directory: /opt/gaelcarebot
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

      - name: Wait for healthcheck
        working-directory: /opt/gaelcarebot
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 12); do
            health=$(docker inspect --format='{{.State.Health.Status}}' gaelcarebot 2>/dev/null || echo "not-found")
            if [ "$health" = "healthy" ]; then
              echo "Container is healthy!"
              exit 0
            fi
            echo "Attempt $i/12 (current: ${health}) — waiting 10s..."
            sleep 10
          done
          echo "Healthcheck failed after 120s — last status: ${health}"
          exit 1

      - name: Clean up old images
        working-directory: /opt/gaelcarebot
        run: docker image prune -f
