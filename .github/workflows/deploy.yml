name: Deploy

on:
  push:
    branches: [master]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        working-directory: /opt/gaelcarebot
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

      - name: Restart services
        working-directory: /opt/gaelcarebot
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

      - name: Wait for healthcheck
        working-directory: /opt/gaelcarebot
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 12); do
            status=$(docker compose ps --status healthy --format '{{.Name}}' 2>/dev/null || echo "")
            if echo "$status" | grep -q "gaelcarebot"; then
              echo "Container is healthy!"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "Healthcheck failed after 120s"
          exit 1

      - name: Clean up old images
        working-directory: /opt/gaelcarebot
        run: docker image prune -f
